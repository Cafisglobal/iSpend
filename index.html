<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="iSpend">
<meta name="theme-color" content="#0a0908">
<title>iSpend</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#0a0908;--surface:#141210;--card:#1c1a17;--border:#2a2720;
  --gold:#d4a843;--gold2:#e8c060;--text:#f0ead8;--muted:#6a6248;--dim:#2e2b22;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;font-size:15px}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
#pin-screen{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:40px 32px}
.pin-logo{font-size:48px;margin-bottom:8px}
.pin-title{font-size:22px;font-weight:700;color:var(--gold);margin-bottom:6px;letter-spacing:-.02em}
.pin-subtitle{font-size:13px;color:var(--muted);margin-bottom:40px;text-align:center;line-height:1.5}
.pin-dots{display:flex;gap:16px;margin-bottom:40px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .15s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-dot.error{background:var(--red);border-color:var(--red)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%}
.pin-key{padding:18px;background:var(--card);border:1px solid var(--border);border-radius:12px;font-size:20px;font-weight:600;color:var(--text);text-align:center;transition:all .1s;-webkit-user-select:none;user-select:none}
.pin-key:active{background:var(--gold);color:#000;transform:scale(.95)}
.pin-key.action{font-size:13px;color:var(--muted)}
.pin-error{color:var(--red);font-size:12px;margin-top:12px;height:16px;text-align:center}
.pin-reset{margin-top:24px;font-size:12px;text-decoration:underline;background:none;border:none;color:var(--muted)}
#header{padding:54px 18px 12px;background:var(--bg);flex-shrink:0}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start}
.app-name{font-size:24px;font-weight:800;color:var(--gold);letter-spacing:-.03em}
.app-tag{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}
.hdr-right{text-align:right}
.hdr-lbl{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.hdr-amt{font-size:20px;font-weight:700;color:var(--gold2);line-height:1.2;letter-spacing:-.02em}
#tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:11px 0;font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;background:none;border:none;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pane{display:none;padding:14px 16px 32px}
.pane.on{display:block}
.tog-row{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;gap:3px;margin-bottom:14px}
.tog{flex:1;padding:9px;font-size:12px;font-weight:700;background:none;border:none;color:var(--muted);border-radius:6px;transition:all .15s;text-align:center}
.tog.on{background:var(--gold);color:#000}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.fld{margin-bottom:10px}
.lbl{display:block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px}
input[type=text],input[type=number],input[type=date],select{width:100%;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:14px;outline:none;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--gold)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-add{width:100%;padding:13px;background:var(--gold);border:none;border-radius:8px;color:#000;font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;transition:all .15s;margin-top:2px}
.btn-add:active{opacity:.8}
.btn-add.ok{background:var(--green);color:#fff}
.sec-lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:14px 0 7px}
.entry{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ebody{flex:1;min-width:0}
.edesc{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.emeta{font-size:10px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.eamt{font-size:14px;font-weight:700;flex-shrink:0}
.eamt.exp{color:var(--red)}
.eamt.tr{color:var(--blue)}
.del{background:none;border:none;color:var(--dim);font-size:20px;line-height:1;padding:0 0 0 6px;flex-shrink:0}
.del:active{color:var(--red)}
.mpick{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mnav{background:none;border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;font-size:18px;display:flex;align-items:center;justify-content:center}
.mlbl{font-size:18px;font-weight:700;color:var(--gold2);letter-spacing:-.02em}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px}
.slbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.sval{font-size:17px;font-weight:700;line-height:1;letter-spacing:-.02em}
.sval.gold{color:var(--gold)}.sval.red{color:var(--red)}.sval.blue{color:var(--blue)}
.card-t{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:12px}
.bar-row{margin-bottom:11px}
.bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.bar-name{font-size:12px;font-weight:600}
.bar-r{display:flex;gap:8px;align-items:baseline}
.bar-amt{font-size:12px;font-weight:700}
.bar-pct{font-size:10px;color:var(--muted)}
.bar-track{height:5px;background:var(--dim);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.trend-wrap{display:flex;align-items:flex-end;gap:5px;height:80px;margin-top:10px}
.tcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.tbars{display:flex;gap:2px;align-items:flex-end;height:70px;width:100%}
.tbar{flex:1;border-radius:3px 3px 0 0;min-height:2px}
.tbar.exp{background:var(--gold)}.tbar.tr{background:var(--blue)}
.tmo{font-size:8px;color:var(--muted);text-transform:uppercase}
.legend{display:flex;gap:14px;margin-bottom:8px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.leg-dot{width:8px;height:8px;border-radius:2px}
.f-row{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.f-row::-webkit-scrollbar{display:none}
.fbtn{padding:6px 13px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;font-weight:600}
.fbtn.on{background:var(--gold);border-color:var(--gold);color:#000}
.empty{text-align:center;padding:48px 0;color:var(--muted);font-size:13px}
.export-btn{width:100%;padding:12px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;margin-top:8px}
.export-btn:active{background:var(--surface)}
</style>
</head>
<body>
<div id="app">
  <div id="pin-screen">
    <div class="pin-logo">💰</div>
    <div class="pin-title">iSpend</div>
    <div class="pin-subtitle" id="pin-sub">Enter your 4-digit PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key action" onclick="pinClear()">Clear</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key action" onclick="pinBack()">⌫</button>
    </div>
    <div class="pin-error" id="pin-err"></div>
    <button class="pin-reset" id="pin-reset-btn" onclick="resetPin()" style="display:none">Forgot PIN? Reset app</button>
  </div>

  <div id="main" style="display:none;flex-direction:column;height:100%">
    <div id="header">
      <div class="hdr-row">
        <div><div class="app-name">iSpend</div><div class="app-tag">Personal Finance · ₱ PHP</div></div>
        <div class="hdr-right"><div class="hdr-lbl">This Month</div><div class="hdr-amt" id="hdr-total">₱0.00</div></div>
      </div>
    </div>
    <div id="tabs">
      <button class="tab on" onclick="showTab('log',this)">Log</button>
      <button class="tab" onclick="showTab('analyze',this)">Analyze</button>
      <button class="tab" onclick="showTab('data',this)">Data</button>
    </div>
    <div id="content">

      <div class="pane on" id="pane-log">
        <div class="tog-row">
          <button class="tog on" id="tog-exp" onclick="setMode('expense')">💸 Expense</button>
          <button class="tog" id="tog-tr" onclick="setMode('transfer')">🏦 Transfer</button>
        </div>
        <div id="f-exp">
          <div class="card">
            <div class="g2">
              <div class="fld"><label class="lbl">Date</label><input type="date" id="e-date"></div>
              <div class="fld"><label class="lbl">Category</label>
                <select id="e-cat">
                  <option>Food & Dining</option><option>Transport</option><option>Accommodation</option>
                  <option>Entertainment</option><option>Shopping</option><option>Health</option>
                  <option>Medical</option><option>Sports</option><option>Travel</option>
                  <option>Education</option><option>Anilao</option><option>Car</option><option>Home</option><option>Work</option><option>Utilities</option><option>Other</option>
                </select>
              </div>
            </div>
            <div class="fld"><label class="lbl">Description</label><input type="text" id="e-desc" placeholder="e.g. Lunch at Mantra"></div>
            <div class="g2">
              <div class="fld"><label class="lbl">Amount (₱)</label><input type="number" id="e-amt" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
              <div class="fld"><label class="lbl">Payment</label>
                <select id="e-pay">
                  <option>Cash</option><option>GCash</option><option>Maya</option>
                  <option>BPI Card</option><option>BDO Card</option><option>UnionBank Card</option>
                  <option>Metrobank Card</option><option>Chinabank Card</option>
                  <option>Security Bank Card</option><option>RCBC Card</option>
                  <option>Other Card</option><option>Bank Transfer</option>
                </select>
              </div>
            </div>
            <div class="fld"><label class="lbl">Notes (optional)</label><input type="text" id="e-notes" placeholder="e.g. with Tonich, business lunch"></div>
            <button class="btn-add" id="btn-exp" onclick="addExpense()">Add Expense</button>
          </div>
        </div>
        <div id="f-tr" style="display:none">
          <div class="card">
            <div class="fld"><label class="lbl">Date</label><input type="date" id="t-date"></div>
            <div class="g2">
              <div class="fld"><label class="lbl">From Bank</label>
                <select id="t-from">
                  <option>BPI</option><option>BDO</option><option>UnionBank</option>
                  <option>Metrobank</option><option>Chinabank</option><option>Security Bank</option>
                  <option>RCBC</option><option>Landbank</option><option>DBP</option><option>Other</option>
                </select>
              </div>
              <div class="fld"><label class="lbl">To</label>
                <select id="t-to">
                  <option>GCash</option><option>Maya</option><option>Cash</option>
                  <option>Other Bank</option><option>Other</option>
                </select>
              </div>
            </div>
            <div class="fld"><label class="lbl">Amount (₱)</label><input type="number" id="t-amt" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
            <div class="fld"><label class="lbl">Notes (optional)</label><input type="text" id="t-notes" placeholder="e.g. monthly allowance"></div>
            <button class="btn-add" id="btn-tr" onclick="addTransfer()">Add Transfer</button>
          </div>
        </div>
        <div id="today-wrap"></div>
      </div>

      <div class="pane" id="pane-analyze">
        <div class="mpick">
          <button class="mnav" onclick="shiftMonth(-1)">‹</button>
          <div class="mlbl" id="mlbl"></div>
          <button class="mnav" onclick="shiftMonth(1)">›</button>
        </div>
        <div class="sgrid">
          <div class="scard"><div class="slbl">Total Spent</div><div class="sval red" id="a-exp">₱0</div></div>
          <div class="scard"><div class="slbl">Transfers In</div><div class="sval blue" id="a-tr">₱0</div></div>
          <div class="scard"><div class="slbl">Transactions</div><div class="sval gold" id="a-cnt">0</div></div>
          <div class="scard"><div class="slbl">Daily Average</div><div class="sval" id="a-avg">₱0</div></div>
        </div>
        <div class="card"><div class="card-t">By Category</div><div id="a-cat"></div></div>
        <div class="card"><div class="card-t">By Payment Method</div><div id="a-pay"></div></div>
        <div class="card">
          <div class="card-t">6-Month Trend</div>
          <div class="legend">
            <div class="leg-item"><div class="leg-dot" style="background:var(--gold)"></div>Expenses</div>
            <div class="leg-item"><div class="leg-dot" style="background:var(--blue)"></div>Transfers</div>
          </div>
          <div class="trend-wrap" id="a-trend"></div>
        </div>
      </div>

      <div class="pane" id="pane-data">
        <div class="f-row" id="d-filters"></div>
        <div id="d-list"></div>
        <button class="export-btn" onclick="exportCSV()">⬇ Export as CSV</button>
      </div>

    </div>
  </div>
</div>
<script>
const KEY='ispend_data_v1',PIN_KEY='ispend_pin',SES_KEY='ispend_session';
let DB=[];
try{DB=JSON.parse(localStorage.getItem(KEY))||[];}catch(_){}
function save(){localStorage.setItem(KEY,JSON.stringify(DB));}
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmt(n){return '₱'+Number(n).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});}
const today=new Date().toISOString().split('T')[0];
const CC={'Food & Dining':'#f59e0b','Transport':'#3b82f6','Accommodation':'#8b5cf6','Entertainment':'#ec4899','Shopping':'#10b981','Health':'#ef4444','Medical':'#fb7185','Sports':'#22d3ee','Travel':'#a3e635','Education':'#fb923c','Anilao':'#06b6d4','Car':'#f97316','Home':'#84cc16','Work':'#6366f1','Utilities':'#14b8a6','Other':'#94a3b8'};
const PC={'Cash':'#f59e0b','GCash':'#4ade80','Maya':'#60a5fa','BPI Card':'#818cf8','BDO Card':'#f472b6','UnionBank Card':'#34d399','Metrobank Card':'#fb923c','Chinabank Card':'#22d3ee','Security Bank Card':'#a78bfa','RCBC Card':'#38bdf8','Other Card':'#94a3b8','Bank Transfer':'#cbd5e1'};
let pinBuf='',pinMode='enter',pinTmp='';
function initPin(){
  const stored=localStorage.getItem(PIN_KEY),ses=sessionStorage.getItem(SES_KEY);
  if(!stored){pinMode='set';document.getElementById('pin-sub').textContent='Set a 4-digit PIN to secure your app';}
  else if(ses==='ok'){unlockApp();return;}
  else{pinMode='enter';document.getElementById('pin-sub').textContent='Enter your PIN';document.getElementById('pin-reset-btn').style.display='block';}
}
function pinKey(k){if(pinBuf.length>=4)return;pinBuf+=k;updateDots();if(pinBuf.length===4)setTimeout(handlePin,80);}
function pinBack(){pinBuf=pinBuf.slice(0,-1);updateDots();}
function pinClear(){pinBuf='';updateDots();}
function updateDots(err){for(let i=0;i<4;i++){const d=document.getElementById('d'+i);d.className='pin-dot';if(err)d.classList.add('error');else if(i<pinBuf.length)d.classList.add('filled');}}
function handlePin(){
  if(pinMode==='set'){pinTmp=pinBuf;pinBuf='';pinMode='confirm';document.getElementById('pin-sub').textContent='Confirm your PIN';updateDots();}
  else if(pinMode==='confirm'){
    if(pinBuf===pinTmp){localStorage.setItem(PIN_KEY,pinBuf);sessionStorage.setItem(SES_KEY,'ok');unlockApp();}
    else{pinBuf='';pinTmp='';pinMode='set';document.getElementById('pin-sub').textContent="PINs didn't match. Try again";showErr("PINs didn't match");}
  }else{
    if(pinBuf===localStorage.getItem(PIN_KEY)){sessionStorage.setItem(SES_KEY,'ok');unlockApp();}
    else{pinBuf='';updateDots(true);showErr('Incorrect PIN');setTimeout(()=>{updateDots();document.getElementById('pin-err').textContent='';},600);}
  }
}
function showErr(m){document.getElementById('pin-err').textContent=m;setTimeout(()=>document.getElementById('pin-err').textContent='',2000);}
function resetPin(){if(confirm('Clear ALL data and reset the app?')){localStorage.clear();sessionStorage.clear();location.reload();}}
function unlockApp(){document.getElementById('pin-screen').style.display='none';const m=document.getElementById('main');m.style.display='flex';initApp();}
let aYM=today.slice(0,7),dFilter='all';
function initApp(){
  document.getElementById('e-date').value=today;
  document.getElementById('t-date').value=today;
  renderHeader();renderToday();renderAnalyze();renderData();
}
function showTab(name,btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('pane-'+name).classList.add('on');btn.classList.add('on');
  if(name==='analyze')renderAnalyze();if(name==='data')renderData();
}
function setMode(m){
  document.getElementById('f-exp').style.display=m==='expense'?'block':'none';
  document.getElementById('f-tr').style.display=m==='transfer'?'block':'none';
  document.getElementById('tog-exp').classList.toggle('on',m==='expense');
  document.getElementById('tog-tr').classList.toggle('on',m==='transfer');
}
function addExpense(){
  const desc=document.getElementById('e-desc').value.trim(),amt=parseFloat(document.getElementById('e-amt').value);
  if(!desc||!amt)return;
  DB.unshift({id:Date.now(),type:'expense',date:document.getElementById('e-date').value,description:desc,amount:amt,category:document.getElementById('e-cat').value,paymentMethod:document.getElementById('e-pay').value,notes:document.getElementById('e-notes').value.trim()});
  save();document.getElementById('e-desc').value='';document.getElementById('e-amt').value='';document.getElementById('e-notes').value='';
  flash('btn-exp','✓ Saved');renderHeader();renderToday();
}
function addTransfer(){
  const amt=parseFloat(document.getElementById('t-amt').value);if(!amt)return;
  DB.unshift({id:Date.now(),type:'transfer',date:document.getElementById('t-date').value,fromBank:document.getElementById('t-from').value,to:document.getElementById('t-to').value,amount:amt,notes:document.getElementById('t-notes').value.trim()});
  save();document.getElementById('t-amt').value='';document.getElementById('t-notes').value='';
  flash('btn-tr','✓ Saved');renderHeader();renderToday();
}
function flash(id,txt){const b=document.getElementById(id),o=b.textContent;b.textContent=txt;b.classList.add('ok');setTimeout(()=>{b.textContent=o;b.classList.remove('ok');},1800);}
function del(id){DB=DB.filter(e=>e.id!==id);save();renderHeader();renderToday();renderAnalyze();renderData();}
function renderHeader(){document.getElementById('hdr-total').textContent=fmt(DB.filter(e=>e.type==='expense'&&e.date.startsWith(today.slice(0,7))).reduce((s,e)=>s+e.amount,0));}
function renderToday(){
  const items=DB.filter(e=>e.date===today),wrap=document.getElementById('today-wrap');
  if(!items.length){wrap.innerHTML='';return;}
  const tot=items.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
  wrap.innerHTML=`<div class="sec-lbl">Today${tot>0?' · '+fmt(tot):''}</div>`+items.map(eHTML).join('');
}
function eHTML(e){
  if(e.type==='expense'){
    const c=CC[e.category]||'#94a3b8',m=[e.category,e.paymentMethod,e.notes].filter(Boolean).join(' · ');
    return `<div class="entry"><div class="dot" style="background:${c}"></div><div class="ebody"><div class="edesc">${e.description}</div><div class="emeta">${e.date} · ${m}</div></div><div class="eamt exp">${fmt(e.amount)}</div><button class="del" onclick="del(${e.id})">×</button></div>`;
  }
  return `<div class="entry"><div class="dot" style="background:#60a5fa"></div><div class="ebody"><div class="edesc">${e.fromBank} → ${e.to}</div><div class="emeta">${e.date}${e.notes?' · '+e.notes:''}</div></div><div class="eamt tr">${fmt(e.amount)}</div><button class="del" onclick="del(${e.id})">×</button></div>`;
}
function shiftMonth(dir){const[y,m]=aYM.split('-').map(Number),d=new Date(y,m-1+dir,1);aYM=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;renderAnalyze();}
function renderAnalyze(){
  const[y,m]=aYM.split('-').map(Number);
  document.getElementById('mlbl').textContent=`${MONTHS[m-1]} ${y}`;
  const mE=DB.filter(e=>e.type==='expense'&&e.date.startsWith(aYM)),mT=DB.filter(e=>e.type==='transfer'&&e.date.startsWith(aYM));
  const tE=mE.reduce((s,e)=>s+e.amount,0),tT=mT.reduce((s,e)=>s+e.amount,0),days=new Date(y,m,0).getDate();
  document.getElementById('a-exp').textContent=fmt(tE);document.getElementById('a-tr').textContent=fmt(tT);
  document.getElementById('a-cnt').textContent=mE.length+mT.length;document.getElementById('a-avg').textContent=fmt(tE/days);
  const cM={},pM={};
  mE.forEach(e=>{cM[e.category]=(cM[e.category]||0)+e.amount;pM[e.paymentMethod]=(pM[e.paymentMethod]||0)+e.amount;});
  renderBars('a-cat',cM,tE,CC);renderBars('a-pay',pM,tE,PC);renderTrend(y,m);
}
function renderBars(id,map,total,colors){
  const el=document.getElementById(id),sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length){el.innerHTML='<div style="color:var(--muted);font-size:12px;text-align:center;padding:10px 0">No data</div>';return;}
  const maxV=sorted[0][1];
  el.innerHTML=sorted.map(([n,a])=>{const p=total>0?(a/total*100).toFixed(1):0,w=(a/maxV*100).toFixed(1),c=colors[n]||'#94a3b8';
    return `<div class="bar-row"><div class="bar-top"><span class="bar-name">${n}</span><div class="bar-r"><span class="bar-amt">${fmt(a)}</span><span class="bar-pct">${p}%</span></div></div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${c}"></div></div></div>`;
  }).join('');
}
function renderTrend(y,m){
  const mos=[];for(let i=5;i>=0;i--){const d=new Date(y,m-1-i,1);mos.push({ym:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,lbl:MONTHS[d.getMonth()]});}
  const exps=mos.map(mo=>DB.filter(e=>e.type==='expense'&&e.date.startsWith(mo.ym)).reduce((s,e)=>s+e.amount,0));
  const trs=mos.map(mo=>DB.filter(e=>e.type==='transfer'&&e.date.startsWith(mo.ym)).reduce((s,e)=>s+e.amount,0));
  const maxV=Math.max(...exps,...trs,1);
  document.getElementById('a-trend').innerHTML=mos.map((mo,i)=>{
    const eh=Math.max(Math.round(exps[i]/maxV*66),exps[i]>0?3:0),th=Math.max(Math.round(trs[i]/maxV*66),trs[i]>0?3:0);
    return `<div class="tcol"><div class="tbars"><div class="tbar exp" style="height:${eh}px"></div><div class="tbar tr" style="height:${th}px"></div></div><div class="tmo">${mo.lbl}</div></div>`;
  }).join('');
}
function renderData(){
  document.getElementById('d-filters').innerHTML=['all','expense','transfer'].map(f=>`<button class="fbtn${dFilter===f?' on':''}" onclick="setFilter('${f}')">${f==='all'?'All':f==='expense'?'Expenses':'Transfers'}</button>`).join('');
  const filtered=DB.filter(e=>dFilter==='all'||e.type===dFilter),list=document.getElementById('d-list');
  if(!filtered.length){list.innerHTML='<div class="empty">No entries yet</div>';return;}
  const groups={};filtered.forEach(e=>{if(!groups[e.date])groups[e.date]=[];groups[e.date].push(e);});
  list.innerHTML=Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,items])=>{
    const dt=items.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    return `<div class="sec-lbl">${date}${dt>0?' · '+fmt(dt):''}</div>`+items.map(eHTML).join('');
  }).join('');
}
function setFilter(f){dFilter=f;renderData();}
function exportCSV(){
  const rows=[['Type','Date','Description','Category/To','Amount','Payment Method','From Bank','Notes']];
  [...DB].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e=>{
    if(e.type==='expense')rows.push(['Expense',e.date,e.description,e.category,e.amount,e.paymentMethod,'',e.notes||'']);
    else rows.push(['Transfer',e.date,'',e.to,'','',e.fromBank,e.notes||'']);
  });
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='ispend-'+today+'.csv';a.click();
}
if('serviceWorker' in navigator){
  const sw=`const C='ispend-v1';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/'])));self.skipWaiting();});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==C).map(x=>caches.delete(x)))));self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>r)));});`;
  const url=URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
  navigator.serviceWorker.register(url).catch(()=>{});
}
initPin();
</script>
